name: Dependabot auto-merge & tests
"on":
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            relevant:
              - 'src/**'
              - 'tests/**'
              - '.github/phpunit.xml'
              - 'composer.json'
              - 'composer.lock'

  tests:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    uses: centralnicgroup-opensource/rtldev-middleware-shareable-workflows/.github/workflows/php-sdk-test.yml@main
    secrets: inherit

  ci-success:
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.tests.result }}" != "success" ] && [ "${{ needs.tests.result }}" != "skipped" ]; then
            echo "Tests failed or were cancelled"
            exit 1
          fi
