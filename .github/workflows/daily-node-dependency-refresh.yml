name: Daily Node dependency refresh

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-node-dependency-refresh
  cancel-in-progress: false

jobs:
  refresh-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Refresh package.json and pnpm lockfile
        run: |
          npx npm-check-updates -u --packageManager pnpm --target patch
          npx npm-check-updates -u --packageManager pnpm --target minor
          rm -rf node_modules .pnpm-store pnpm-lock.yaml
          pnpm update

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.MERGE_AUTOMATION_TOKEN || github.token }}
          branch: automation/daily-node-dependency-refresh
          base: master
          delete-branch: true
          commit-message: "chore(deps): refresh node dependencies"
          title: "chore(deps): refresh node dependencies"
          body: |
            ## Summary
            - update package.json with npm-check-updates patch and minor releases
            - remove pnpm install state and regenerate pnpm-lock.yaml with pnpm update
            - enable auto-merge after repository checks pass

      - name: Enable auto-merge
        if: ${{ steps.create-pr.outputs.pull-request-number != '' }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ github.token }}
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: squash
